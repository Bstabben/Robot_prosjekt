# HSV colour ranges for cube detection.
# OpenCV HSV: H in [0,180], S in [0,255], V in [0,255]
#
# Red wraps around H=0/180, so two ranges are needed (range0 + range1).
# Yellow and blue each need only one range.
#
# Tune these values with the hsv_tuner.py helper script or with
# `ros2 param set /detection_node hsv.<color>.range<n>.lower "[H,S,V]"`.

detection_node:
  ros__parameters:
    min_contour_area: 500        # px² — smaller blobs are ignored
    publish_debug_image: true    # publish annotated image on vision/debug_image

    hsv:
      red:
        range0:
          lower: [0,   120,  70]
          upper: [10,  255, 255]
        range1:
          lower: [170, 120,  70]
          upper: [180, 255, 255]
      yellow:
        range0:
          lower: [15,  10, 180]
          upper: [40, 255, 255]
      blue:
        range0:
          lower: [100, 150,  50]
          upper: [130, 255, 255]

camera_node:
  ros__parameters:
    device_id: 4          # /dev/video4 — USB webcam
    frame_rate: 30.0
    frame_width: 640
    frame_height: 480
