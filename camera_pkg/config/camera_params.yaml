# Camera hardware interface parameters
# OpenCV HSV: H in [0,180], S in [0,255], V in [0,255]

camera_node:
  ros__parameters:
    device_id: 4          # /dev/video4 — USB webcam
    frame_rate: 30.0
    frame_width: 640
    frame_height: 480
    camera_frame: camera_link
    # Absolute path to calibration.yaml from cameracalibrator.
    # Pass via launch arg: calibration_file:=file:///path/to/calibration.yaml
    calibration_url: ''

# table_z: jog the TCP to the table surface and read the Z value in base_link.
# camera_frame and base_frame must match the TF frames from ur_robot_driver.
transform_node:
  ros__parameters:
    table_z: 0.0
    camera_frame: camera_link
    base_frame: base_link
