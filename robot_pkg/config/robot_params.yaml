# All joint values are in radians.
# Positive direction follows the right-hand rule for each joint.

motion_node:
  ros__parameters:
    # Standard upright home: elbow straight, wrists neutral
    home_joints: [0.0, -1.5708, 0.0, -1.5708, 0.0, 0.0]

    # Overview position: arm extended over the table, camera pointing down.
    # TUNE THIS before first run — jog the robot to the desired pose and read
    # joint values from: ros2 topic echo /joint_states
    overview_joints: [0.0, -1.2, 1.0, -1.35, -1.5708, 0.0]

    # Search positions tried (in order) when a cube is not found at overview.
    # Add more poses as needed; each is a flat list of 6 joint values.
    search_joints_0: [0.3,  -1.2, 1.0, -1.35, -1.5708, 0.0]
    search_joints_1: [-0.3, -1.2, 1.0, -1.35, -1.5708, 0.0]
    search_joints_2: [0.0,  -1.0, 1.2, -1.5,  -1.5708, 0.0]
    search_count: 3

    # Distance above the cube surface to stop at (metres)
    approach_height: 0.10

    # Tool orientation when pointing at a cube (quaternion xyzw, tool pointing down).
    # Default assumes tool0 Z-axis points away from flange — adjust if needed.
    approach_quat: [1.0, 0.0, 0.0, 0.0]

    # MoveIt2 / robot config
    group_name: ur_manipulator
    base_frame: base_link
    end_effector: tool0

coordinator_node:
  ros__parameters:
    # Seconds to wait for all three cubes before triggering search
    detection_timeout: 5.0
    # Seconds to wait at each search position before giving up
    search_timeout: 4.0
